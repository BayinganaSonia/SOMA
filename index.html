<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SOMA+ Smart Learning Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
--primary:#5b83ff;
--accent:#f59e0b;
--danger:#ef4444;
--success:#14b8a6;
--bg:#0f172a;
--bg-alt:#111b33;
--text:#e2e8f0;
--subtext:#cbd5e1;
--card:#1f2937;
--card-gradient:linear-gradient(145deg,#1f2a44 0%,#293659 100%);
--shadow:0 12px 34px rgba(0,0,0,0.35);
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}
body{
background: radial-gradient(circle at top left, rgba(91,131,255,0.22), transparent 40%),
linear-gradient(145deg, var(--bg), var(--bg-alt));
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
position:relative;
overflow-x:hidden;
animation: bgPulse 18s ease-in-out infinite;
}
@keyframes bgPulse {
0% { filter: saturate(1) hue-rotate(0deg); }
25% { filter: saturate(1.1) hue-rotate(3deg); }
50% { filter: saturate(1.2) hue-rotate(6deg); }
75% { filter: saturate(1.1) hue-rotate(3deg); }
100% { filter: saturate(1) hue-rotate(0deg); }
}
header{
position:relative;
overflow:hidden;
background: rgba(15,23,42,0.72);
backdrop-filter: blur(7px);
height:300px;
min-height:280px;
padding:50px 30px;
border-radius:0 0 24px 24px;
box-shadow: var(--shadow);
text-align:center;
margin-top:24px;
margin-bottom:28px;
}
.header-overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
background: radial-gradient(circle at 30% 10%, rgba(255,255,255,0.25), transparent 52%),
radial-gradient(circle at 80% 60%, rgba(76,175,255,0.2), transparent 50%);
filter: blur(1.3px);
opacity:0.78;
animation: overlayShine 10s linear infinite;
}
@keyframes overlayShine {
0%,100% { transform: translateX(-12px); opacity:0.78; }
50% { transform: translateX(14px); opacity:0.95; }
}
header h1{
font-size:3.4rem;
letter-spacing:3px;
color:#ffffff;
text-shadow: 0 2px 16px rgba(0,0,0,0.8);
animation: titlePulse 8s ease-in-out infinite;
}
header p{
color: rgba(255,255,255,0.95);
text-shadow: 0 1px 12px rgba(0,0,0,0.75);
font-weight:500;
}
@keyframes titlePulse {
0%, 100% { transform: translateY(0) scale(1); }
50% { transform: translateY(-4px) scale(1.02); }
}
.auth-container{
background: rgba(15,23,42,0.88);
border: 1px solid rgba(148,163,184,0.2);
padding:42px;
border-radius:18px;
box-shadow: var(--shadow);
max-width:480px;
width:92%;
text-align:center;
backdrop-filter: blur(6px);
animation: floatUp 0.8s ease-out 240ms forwards;
opacity:0;
position: relative;
}
@keyframes floatUp {
0% { transform: translateY(18px); opacity:0; }
100% { transform: translateY(0); opacity:1; }
}
.tab-buttons {
display: flex;
background: rgba(31,41,55,0.8);
border-radius: 12px;
margin-bottom: 24px;
overflow: hidden;
}
.tab-btn {
flex: 1;
padding: 12px 20px;
border: none;
background: transparent;
color: var(--subtext);
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
}
.tab-btn.active {
background: linear-gradient(135deg, var(--primary), #06b6d4);
color: white;
}
input, select, textarea {
display: block;
margin: 12px auto;
padding: 14px;
width: 92%;
border: 1px solid rgba(148,163,184,0.45);
border-radius: 12px;
font-size: 15px;
background: rgba(15,23,42,0.65);
color: var(--text);
}
input:focus, select:focus, textarea:focus { outline: 2px solid rgba(91,131,255,0.65); }
.password-strength {
height: 4px;
border-radius: 2px;
margin: 8px auto;
width: 92%;
background: rgba(148,163,184,0.3);
overflow: hidden;
transition: all 0.3s ease;
}
.strength-weak { background: var(--danger); width: 33%; }
.strength-medium { background: var(--accent); width: 66%; }
.strength-strong { background: var(--success); width: 100%; }
.form-row {
display: flex;
gap: 12px;
}
.form-row input {
flex: 1;
width: auto;
margin: 12px 0;
}
.checkbox-group {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
margin: 16px 0;
color: var(--subtext);
font-size: 14px;
}
button {
padding: 14px 28px;
border: none;
border-radius: 12px;
font-size: 17px;
font-weight: 600;
cursor: pointer;
background: linear-gradient(135deg, #4f46e5, #06b6d4);
color: white;
margin: 12px 6px 8px;
transition: all 0.25s ease;
width: 100%;
}
button:hover {
transform: translateY(-2px) scale(1.02);
box-shadow: 0 12px 24px rgba(12,22,50,0.4);
}
button:disabled {
opacity: 0.6;
cursor: not-allowed;
transform: none;
}
.toggle-role {
background: linear-gradient(135deg, var(--accent), #f59e0b);
margin-top: 8px;
padding: 10px 20px;
font-size: 15px;
}
.message {
color: var(--accent);
margin-top: 16px;
font-weight: 600;
min-height: 20px;
}
.error { color: var(--danger) !important; }
.success { color: var(--success) !important; }
.hidden { display: none; }
</style>
</head>
<body>
<header>
<div class="header-overlay"></div>
<h1>SOMA+</h1>
<p>Smart Learning Platform</p>
</header>
<div class="auth-container">
<div class="tab-buttons">
<button class="tab-btn active" onclick="switchTab('login')">Login</button>
<button class="tab-btn" onclick="switchTab('register')">Register</button>
</div>
<div id="login-form">
<h2>Login</h2>
<input type="text" id="login-username" placeholder="Username">
<input type="password" id="login-password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
<div id="register-form" class="hidden">
<h2>Registration</h2>
<input type="text" id="full_name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email (required for teachers)" style="margin:12px auto;width:92%;">
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm_password" placeholder="Confirm Password">
<div class="password-strength" id="strength-bar"></div>
<select id="role">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>
<label class="checkbox-group">
<input type="checkbox" id="terms"> I accept the <a href="#" style="color:var(--primary);">terms and conditions</a>
</label>
<button id="register-btn" onclick="register()" disabled>Register</button>
<button class="toggle-role" onclick="toggleRole()">Switch to Teacher/Student</button>
</div>
<p class="message" id="message"></p>
</div>
<script>
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  if (tab === 'register') {
    attachValidationListeners();
  }
  document.getElementById('message').innerText = '';
}

function setMessage(text, type = 'accent') {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.className = `message ${type}`;
}

function updateStrengthBar() {
  const pwd = document.getElementById('password').value;
  const bar = document.getElementById('strength-bar');
  bar.className = 'password-strength';
  if (pwd.length >= 8 && /[A-Za-z]/.test(pwd) && /[0-9]/.test(pwd)) {
    bar.classList.add('strength-strong');
  } else if (pwd.length >= 6) {
    bar.classList.add('strength-medium');
  } else if (pwd.length > 0) {
    bar.classList.add('strength-weak');
  }
}

function validateRegisterForm() {
  const pwd = document.getElementById('password').value;
  const confirmPwd = document.getElementById('confirm_password').value;
  const terms = document.getElementById('terms').checked;
  const role = document.getElementById('role').value;
  const email = document.getElementById('email').value;
  const fullName = document.getElementById('full_name').value.trim();
  const username = document.getElementById('username').value.trim();

  const isValidPwd = pwd.length >= 8 && /[A-Za-z]/.test(pwd) && /[0-9]/.test(pwd) && pwd === confirmPwd;
  const isValidEmail = role === 'teacher' ? /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email) : true;
  const allFilled = fullName && username && pwd && confirmPwd && (role !== 'teacher' || email);

  document.getElementById('register-btn').disabled = !(allFilled && isValidPwd && terms && isValidEmail);
}

function attachValidationListeners() {
  ['full_name', 'email', 'username', 'password', 'confirm_password'].forEach(id => {
    document.getElementById(id).addEventListener('input', validateRegisterForm);
  });
  document.getElementById('terms').addEventListener('change', validateRegisterForm);
  document.getElementById('role').addEventListener('change', validateRegisterForm);
  document.getElementById('password').addEventListener('input', updateStrengthBar);
}

function toggleRole() {
  const roleSelect = document.getElementById('role');
  roleSelect.value = roleSelect.value === 'student' ? 'teacher' : 'student';
  validateRegisterForm();
}

async function login() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) {
    setMessage('Please enter username and password', 'error');
    return;
  }
  try {
    setMessage('Logging in...');
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await response.json();
    if (response.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('role', data.role);
      window.location.href = '/dashboard.html';
    } else {
      setMessage(data.error || 'Invalid credentials', 'error');
    }
  } catch (error) {
    setMessage('Error logging in', 'error');
  }
}

async function register() {
  const formData = {
    full_name: document.getElementById('full_name').value.trim(),
    email: document.getElementById('email').value.trim(),
    username: document.getElementById('username').value.trim(),
    password: document.getElementById('password').value,
    confirmPassword: document.getElementById('confirm_password').value,
    role: document.getElementById('role').value,
    termsAccepted: document.getElementById('terms').checked
  };
  try {
    setMessage('Registering...');
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });
    const data = await response.json();
    if (response.ok) {
      setMessage('Registration successful! Please login.', 'success');
      switchTab('login');
      document.getElementById('login-username').value = formData.username;
    } else {
      setMessage(data.error || 'Registration failed', 'error');
    }
  } catch (error) {
    setMessage('Error registering', 'error');
  }
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  switchTab('login');
});
</script>
</body>
</html>
