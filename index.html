<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SOMA+ Smart Learning Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
--primary:#8b5cf6;
--accent:#f472b6;
--danger:#ef4444;
--success:#10b981;
--bg:#111827;
--text:#f3f4f6;
--card-gradient:linear-gradient(135deg,#2d3748 0%,#4c1d95 100%);
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}
body{
background:linear-gradient(135deg,var(--bg),#1f2937);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}
header{
text-align:center;
margin-bottom:40px;
}
header h1{
font-size:2.5rem;
letter-spacing:2px;
color:var(--primary);
}
.login-container{
background:var(--card-gradient);
padding:40px;
border-radius:20px;
box-shadow:0 8px 14px rgba(0,0,0,.6);
max-width:400px;
width:100%;
text-align:center;
}
input{
display:block;
margin:15px auto;
padding:15px;
width:100%;
border:none;
border-radius:10px;
font-size:16px;
}
button{
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:var(--primary);
color:white;
margin:10px;
transition:.3s;
}
button:hover{
background:var(--accent);
color:black;
}
.message{
color:var(--danger);
margin-top:10px;
}
</style>
</head>
<body>
<header>
<h1>SOMA+</h1>
<p>Smart Learning Platform</p>
</header>
<div class="login-container">
<h2>Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
<p class="message" id="message"></p>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (response.ok) {
      const data = await response.json();
      localStorage.setItem('token', data.token);
      localStorage.setItem('role', data.role);
      window.location.href = '/dashboard.html';
    } else {
      document.getElementById('message').innerText = 'Invalid credentials';
    }
  } catch (error) {
    document.getElementById('message').innerText = 'Error logging in';
  }
}
async function register() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (response.ok) {
      document.getElementById('message').innerText = 'Registration successful. Please login.';
    } else {
      document.getElementById('message').innerText = 'Registration failed';
    }
  } catch (error) {
    document.getElementById('message').innerText = 'Error registering';
  }
}
</script>
</body>
</html>
