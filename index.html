<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SOMA+ Smart Learning Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
--primary:#5b83ff;
--accent:#f59e0b;
--danger:#ef4444;
--success:#14b8a6;
--bg:#0f172a;
--bg-alt:#111b33;
--text:#e2e8f0;
--subtext:#cbd5e1;
--card:#1f2937;
--card-gradient:linear-gradient(145deg,#1f2a44 0%,#293659 100%);
--shadow:0 12px 34px rgba(0,0,0,0.35);
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}
body{
background: radial-gradient(circle at top left, rgba(91,131,255,0.22), transparent 40%),
linear-gradient(145deg, var(--bg), var(--bg-alt));
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
position:relative;
overflow-x:hidden;
animation: bgPulse 18s ease-in-out infinite;
}
@keyframes bgPulse {
0% { filter: saturate(1) hue-rotate(0deg); }
25% { filter: saturate(1.1) hue-rotate(3deg); }
50% { filter: saturate(1.2) hue-rotate(6deg); }
75% { filter: saturate(1.1) hue-rotate(3deg); }
100% { filter: saturate(1) hue-rotate(0deg); }
}
header{
position:relative;
overflow:hidden;
background: rgba(15,23,42,0.72);
backdrop-filter: blur(7px);
height:300px;
min-height:280px;
padding:50px 30px;
border-radius:0 0 24px 24px;
box-shadow: var(--shadow);
text-align:center;
margin-top:24px;
margin-bottom:28px;
}
.header-overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
background: radial-gradient(circle at 30% 10%, rgba(255,255,255,0.25), transparent 52%),
radial-gradient(circle at 80% 60%, rgba(76,175,255,0.2), transparent 50%);
filter: blur(1.3px);
opacity:0.78;
animation: overlayShine 10s linear infinite;
}
@keyframes overlayShine {
0%,100% { transform: translateX(-12px); opacity:0.78; }
50% { transform: translateX(14px); opacity:0.95; }
}
header::before,
header::after{
content:'';
position:absolute;
inset:0;
background-size:contain;
background-position:center;
background-repeat:no-repeat;
transform-origin:center;
transition:opacity 0.8s ease;
filter: brightness(1.35) saturate(1.25);
z-index:-2;
}
header::before { background-image: url('visually impaired1.jpg'); opacity: 1; animation: headerZoom 20s ease-in-out infinite; }
header::after { background-image: url('visually impaired 2.jpg'); opacity: 0; animation: headerZoom 20s ease-in-out infinite; }
header::before { animation-delay: 0s; }
header::after { animation-delay: 10s; }
header::after, header::before { background-blend-mode: screen; }
header::after { opacity: 0; }
header::before { opacity: 1; }
@keyframes headerZoom {
0% { transform: scale(1.02); opacity: 1; }
45% { transform: scale(1.08); opacity: 0.95; }
50% { transform: scale(1.08); opacity: 0; }
55% { transform: scale(1.08); opacity: 0; }
95% { transform: scale(1.08); opacity: 0; }
100% { transform: scale(1.02); opacity: 1; }
}
@keyframes hdrOverlay {
0%, 49.99% { opacity: 1;} 50%, 100% { opacity: 0; }
}
header h1{
font-size:3.4rem;
letter-spacing:3px;
color:#ffffff;
text-shadow: 0 2px 16px rgba(0,0,0,0.8);
animation: titlePulse 8s ease-in-out infinite;
}
header p{
color: rgba(255,255,255,0.95);
text-shadow: 0 1px 12px rgba(0,0,0,0.75);
font-weight:500;
}
@keyframes titlePulse {
0%, 100% { transform: translateY(0) scale(1); }
50% { transform: translateY(-4px) scale(1.02); }
}
.login-container{
background: rgba(15,23,42,0.88);
border: 1px solid rgba(148,163,184,0.2);
padding:42px;
border-radius:18px;
box-shadow: var(--shadow);
max-width:420px;
width:92%;
text-align:center;
backdrop-filter: blur(6px);
animation: floatUp 0.8s ease-out 240ms forwards;
opacity:0;
}
@keyframes floatUp {
0%{transform: translateY(18px);opacity:0;}
100%{transform: translateY(0);opacity:1;}
}
input{
display:block;
margin:13px auto;
padding:14px;
width:92%;
border:1px solid rgba(148,163,184,0.45);
border-radius:12px;
font-size:15px;
background: rgba(15,23,42,0.65);
color: var(--text);
}
input:focus{outline:2px solid rgba(91,131,255,0.65);}
button{
padding:12px 28px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:600;
cursor:pointer;
background: linear-gradient(135deg, #4f46e5, #06b6d4);
color:white;
margin:8px 6px;
transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
}
button:hover{
transform:translateY(-1px) scale(1.02);
box-shadow:0 10px 20px rgba(12,22,50,0.4);
filter:brightness(1.03);
}
.message{
color:var(--accent);
margin-top:12px;
font-weight:600;
}
</style>
</head>
<body>
<header>
<div class="header-overlay"></div>
<h1>SOMA+</h1>
<p>Smart Learning Platform</p>
</header>
<div class="login-container">
<h2>Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register as Student</button>
<button onclick="registerTeacher()">Register as Teacher</button>
<p class="message" id="message"></p>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (response.ok) {
      const data = await response.json();
      localStorage.setItem('token', data.token);
      localStorage.setItem('role', data.role);
      window.location.href = '/dashboard.html';
    } else {
      document.getElementById('message').innerText = 'Invalid credentials';
    }
  } catch (error) {
    document.getElementById('message').innerText = 'Error logging in';
  }
}
async function register() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role: 'student' })
    });
    if (response.ok) {
      document.getElementById('message').innerText = 'Registration successful. Please login.';
    } else {
      document.getElementById('message').innerText = 'Registration failed';
    }
  } catch (error) {
    document.getElementById('message').innerText = 'Error registering';
  }
}
async function registerTeacher() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role: 'teacher' })
    });
    if (response.ok) {
      document.getElementById('message').innerText = 'Teacher registration successful. Please login.';
    } else {
      document.getElementById('message').innerText = 'Registration failed';
    }
  } catch (error) {
    document.getElementById('message').innerText = 'Error registering';
  }
}
</script>
</body>
</html>
