<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - SOMA+ Smart Learning Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
--primary:#8b5cf6;
--accent:#f472b6;
--danger:#ef4444;
--success:#10b981;
--bg:#111827;
--text:#f3f4f6;
--card-gradient:linear-gradient(135deg,#2d3748 0%,#4c1d95 100%);
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}
body{
background:linear-gradient(135deg,var(--bg),#1f2937);
color:var(--text);
text-align:center;
min-height:100vh;
display:flex;
flex-direction:column;
}
header{
background:var(--primary);
padding:25px;
box-shadow:0 4px 16px rgba(0,0,0,0.6);
}
header h1{
font-size:2.5rem;
letter-spacing:2px;
}
header p{
opacity:.9;
}
.container{
padding:40px 20px;
flex:1;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
max-width:900px;
margin:auto;
}
.card{
background:var(--card-gradient);
padding:40px 25px;
border-radius:20px;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 14px rgba(0,0,0,.6);
}
.card:hover{
background:var(--accent);
color:black;
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 20px var(--accent);
}
.icon{
font-size:2.4rem;
display:block;
margin-bottom:10px;
}
.section{
display:none;
padding:40px 20px;
}
.active{
display:block;
}
.lesson{
background:var(--card-gradient);
padding:30px;
margin:20px auto;
max-width:500px;
border-radius:20px;
text-align:left;
}
.lesson h3{
color:var(--accent);
}
button{
padding:14px 25px;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
background:var(--primary);
color:white;
margin-top:15px;
transition:.3s;
}
button:hover{
background:var(--accent);
color:black;
transform:scale(1.05);
}
.back{
background:var(--danger);
margin-top:30px;
}
.quiz-options button{
display:block;
margin:10px auto;
width:200px;
}
progress{
width:80%;
height:25px;
}
footer{
padding:20px;
opacity:.7;
}
</style>
</head>
<body>
<header>
<div style="display:flex;align-items:center;justify-content:center;gap:12px;">
<span style="font-size:2.5rem;">🎓</span>
<h1>SOMA+</h1>
</div>
<p>Interactive Audio Learning Platform</p>
</header>
<main>
<!-- HOME -->
<div id="home" class="container active">
<div class="grid">
<div class="card" onclick="openPage('lessons'); speak('Opening lessons')">
<span class="icon">📚</span>
Lessons
</div>
<div class="card" onclick="openPage('quiz'); speak('Opening quiz')">
<span class="icon">🧠</span>
Quiz
</div>
<div class="card" onclick="openPage('progress'); speak('Opening progress')">
<span class="icon">📈</span>
Progress
</div>
<div class="card" onclick="openPage('dashboard'); speak('Opening teacher dashboard')">
<span class="icon">👩‍🏫</span>
Teachers
</div>
<div class="card" onclick="startVoice()">
<span class="icon">🎤</span>
Voice
</div>
<div class="card" onclick="help()">
<span class="icon">💡</span>
Help
</div>
<div class="card" onclick="logout()">
<span class="icon">🚪</span>
Logout
</div>
</div>
</div>
<!-- LESSONS -->
<div id="lessons" class="section">
<h2>Lessons</h2>
<div id="lessons-content">
<!-- Lessons will be loaded here -->
</div>
<button class="back" onclick="goHome()">Back</button>
</div>
<!-- QUIZ -->
<div id="quiz" class="section">
<h2>Quiz</h2>
<p id="quiz-question">Loading...</p>
<div class="quiz-options">
<!-- Options will be loaded here -->
</div>
<button class="back" onclick="goHome()">Back</button>
</div>
<!-- PROGRESS -->
<div id="progress" class="section">
<h2>Your Progress</h2>
<p id="progress-text">Loading...</p>
<progress id="progress-bar" value="0" max="100"></progress>
<br>
<button onclick="speakProgress()">Hear Progress</button>
<br>
<button class="back" onclick="goHome()">Back</button>
</div>
<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h2>Teacher Dashboard</h2>
<div class="lesson">
<h3>Student Profiles</h3>
<button onclick="speak('Student profile management')">
View Students
</button>
</div>
<div class="lesson">
<h3>Assign Lessons</h3>
<button onclick="speak('Assign lessons to students')">
Assign Lesson
</button>
</div>
<div class="lesson">
<h3>Progress Reports</h3>
<button onclick="speak('Viewing reports')">
View Reports
</button>
</div>
<button class="back" onclick="goHome()">Back</button>
</div>
</main>
<footer>
<p>© 2026 SOMA+ • Empowering Learning Through Technology</p>
</footer>
<script>
let token = localStorage.getItem('token');
let userRole = localStorage.getItem('role');
const totalLessons = 2;

if (!token) {
  window.location.href = '/login.html';
}

/* NAVIGATION */
function openPage(page){
document.getElementById("home").classList.remove("active");
document.querySelectorAll(".section").forEach(sec=>{
sec.style.display="none";
});
document.getElementById(page).style.display="block";
if (page === 'lessons') loadLessons();
if (page === 'quiz') loadQuiz();
}
/* HOME */
function goHome(){
document.querySelectorAll(".section").forEach(sec=>{
sec.style.display="none";
});
document.getElementById("home").classList.add("active");
}
/* TEXT TO SPEECH */
function speak(text){
let speech = new SpeechSynthesisUtterance(text);
speech.rate = 1;
speech.pitch = 1;
window.speechSynthesis.speak(speech);
}
/* LESSON */
async function loadLessons() {
  try {
    const response = await fetch('/api/lessons', {
      headers: { 'Authorization': token }
    });
    const lessons = await response.json();
    const container = document.getElementById('lessons-content');
    container.innerHTML = '';
    lessons.forEach(lesson => {
      const lessonDiv = document.createElement('div');
      lessonDiv.className = 'lesson';
      lessonDiv.innerHTML = `
        <h3>${lesson.title}</h3>
        <p>${lesson.content}</p>
        <button onclick="playLesson('${lesson.audio_text}', ${lesson.id})">Start Audio Lesson</button>
      `;
      container.appendChild(lessonDiv);
    });
  } catch (error) {
    console.error('Error loading lessons:', error);
  }
}
function playLesson(text, lessonId){
speak(text);
setTimeout(()=>{
speak("Lesson completed. Great job!");
markLessonCompleted(lessonId);
},4000)
}
/* PROGRESS */
async function markLessonCompleted(lessonId){
try {
  await fetch('/api/progress', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': token
    },
    body: JSON.stringify({ lessonId, completed: true })
  });
  updateProgress();
} catch (error) {
  console.error('Error updating progress:', error);
}
}
async function updateProgress(){
try {
  const response = await fetch('/api/progress', {
    headers: { 'Authorization': token }
  });
  const progress = await response.json();
  const completedCount = progress.filter(p => p.completed).length;
  let percent = Math.round((completedCount / totalLessons) * 100);
  document.getElementById("progress-text").innerText = "You completed " + percent + "% of lessons";
  document.getElementById("progress-bar").value = percent;
} catch (error) {
  console.error('Error fetching progress:', error);
}
}
async function speakProgress(){
try {
  const response = await fetch('/api/progress', {
    headers: { 'Authorization': token }
  });
  const progress = await response.json();
  const completedCount = progress.filter(p => p.completed).length;
  let percent = Math.round((completedCount / totalLessons) * 100);
  speak("You completed " + percent + " percent of your lessons");
} catch (error) {
  console.error('Error fetching progress:', error);
}
}
/* QUIZ */
async function loadQuiz() {
  try {
    const response = await fetch('/api/quiz', {
      headers: { 'Authorization': token }
    });
    const quizzes = await response.json();
    if (quizzes.length > 0) {
      const quiz = quizzes[0];
      const options = JSON.parse(quiz.options);
      document.getElementById('quiz-question').innerText = quiz.question;
      const optionsDiv = document.querySelector('.quiz-options');
      optionsDiv.innerHTML = '';
      options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.innerText = option;
        btn.onclick = () => checkAnswer(index, btn, quiz.correct_answer);
        optionsDiv.appendChild(btn);
      });
    }
  } catch (error) {
    console.error('Error loading quiz:', error);
  }
}
function checkAnswer(answer,btn, correctAnswer){
document.querySelectorAll(".quiz-options button").forEach(b=>{
b.disabled=true;
});
if(answer === correctAnswer){
btn.style.background="var(--success)";
speak("Correct answer well done!");
document.body.style.background = "linear-gradient(135deg,#10b981,#6366f1)";
setTimeout(()=>{
document.body.style.background="";
},1000)
}else{
btn.style.background="var(--danger)";
speak("Incorrect answer try again");
}
}
/* HELP */
function help(){
speak("Welcome to SOMA Plus. Use lessons to study, quiz to test knowledge and progress to track learning.");
}
/* VOICE COMMAND */
function startVoice(){
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SpeechRecognition){
speak("Voice commands not supported");
return;
}
const recognition=new SpeechRecognition();
recognition.start();
recognition.onresult=function(event){
let command = event.results[0][0].transcript.toLowerCase();
if(command.includes("lesson")) openPage("lessons");
else if(command.includes("quiz")) openPage("quiz");
else if(command.includes("progress")) openPage("progress");
else if(command.includes("teacher")) openPage("dashboard");
else speak("Command not recognized");
}
}
/* GESTURE */
let startX=0;
document.addEventListener("touchstart",e=>{
startX=e.changedTouches[0].screenX;
});
document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].screenX;
if(endX>startX){
goHome();
}
});
/* LOGOUT */
function logout() {
  token = null;
  userRole = null;
  localStorage.removeItem('token');
  localStorage.removeItem('role');
  window.location.href = '/login.html';
}
/* INIT */
window.onload=function(){
updateProgress();
speak("Welcome back to SOMA Plus. Your smart learning companion.");
}
</script>
</body>
</html>
